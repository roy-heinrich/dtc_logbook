services:
  - type: web
    name: dtc-logbook
    env: php
    runtime: php
    plan: free
    buildCommand: composer install --optimize-autoloader --no-dev && npm install && npm run build && php artisan config:cache && php artisan route:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: error
