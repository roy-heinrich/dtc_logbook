envVarGroups:
  - name: dtc-shared-secrets
    envVars:
      - key: APP_KEY
        generateValue: true

services:
  - type: web
    name: dtc-logbook
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    preDeployCommand: php artisan optimize:clear
    envVars:
      - fromGroup: dtc-shared-secrets
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://dtc-logbook.onrender.com
      - key: APP_DEBUG
        value: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug
      - key: SHOW_ACTUAL_ERRORS
        value: true
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_COOKIE
        value: dtc-logbook-session-v2
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: file
      - key: DASHBOARD_REALTIME_ENABLED
        value: false
      - key: BROADCAST_CONNECTION
        value: log
      - key: BROADCAST_DRIVER
        value: log

  - type: cron
    name: dtc-logbook-scheduler
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: php artisan schedule:run
    schedule: "* * * * *"
    envVars:
      - fromGroup: dtc-shared-secrets
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://dtc-logbook.onrender.com
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: error
      - key: CACHE_STORE
        value: file
      - key: DASHBOARD_REALTIME_ENABLED
        value: false
      - key: BROADCAST_CONNECTION
        value: log
      - key: BROADCAST_DRIVER
        value: log
